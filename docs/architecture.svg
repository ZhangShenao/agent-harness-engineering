<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
<defs>
  <style>
    .t{font-family:Arial,Helvetica,sans-serif}
    .h{font-size:34px;font-weight:700;fill:#0f172a}
    .b{font-size:24px;font-weight:700;fill:#ffffff}
    .s{font-size:18px;fill:#334155}
    .n{fill:#ffffff;stroke:#cbd5e1;stroke-width:2}
    .a{fill:#2563eb}
    .g{fill:#0f766e}
    .p{fill:#7c3aed}
    .o{fill:#ea580c}
    .line{stroke:#64748b;stroke-width:3;marker-end:url(#m)}
  </style>
  <marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
    <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
  </marker>
</defs>
<rect width="1400" height="820" fill="#f8fafc"/>
<text x="70" y="90" class="t h">Agent Harness 核心闭环</text>

<rect x="80" y="150" rx="24" ry="24" width="240" height="110" class="a"/>
<text x="152" y="200" class="t b">User Goal</text>
<text x="124" y="233" class="t" font-size="20" fill="#dbeafe">需求 / 任务输入</text>

<rect x="430" y="150" rx="24" ry="24" width="260" height="110" class="g"/>
<text x="495" y="200" class="t b">Planner</text>
<text x="470" y="233" class="t" font-size="20" fill="#ccfbf1">规划 / 拆解 / 规格化</text>

<rect x="810" y="150" rx="24" ry="24" width="270" height="110" class="p"/>
<text x="878" y="200" class="t b">Generator</text>
<text x="856" y="233" class="t" font-size="20" fill="#ede9fe">执行 / 编码 / 产出</text>

<rect x="1080" y="350" rx="24" ry="24" width="240" height="110" class="o"/>
<text x="1144" y="400" class="t b">Evaluator</text>
<text x="1121" y="433" class="t" font-size="20" fill="#ffedd5">验收 / 反馈 / 纠偏</text>

<rect x="760" y="350" rx="18" ry="18" width="250" height="84" class="n"/>
<text x="835" y="388" class="t" font-size="25" font-weight="700" fill="#0f172a">Tools</text>
<text x="792" y="414" class="t s">bash / browser / search</text>

<rect x="470" y="350" rx="18" ry="18" width="220" height="84" class="n"/>
<text x="518" y="388" class="t" font-size="25" font-weight="700" fill="#0f172a">Workspace</text>
<text x="510" y="414" class="t s">filesystem / git / artifacts</text>

<rect x="220" y="350" rx="18" ry="18" width="190" height="84" class="n"/>
<text x="268" y="388" class="t" font-size="25" font-weight="700" fill="#0f172a">Runtime</text>
<text x="258" y="414" class="t s">sandbox / env</text>

<rect x="470" y="550" rx="18" ry="18" width="520" height="100" class="n"/>
<text x="596" y="592" class="t" font-size="28" font-weight="700" fill="#0f172a">Verification Loop</text>
<text x="554" y="622" class="t s">tests / logs / screenshots / structured feedback</text>

<line x1="320" y1="205" x2="430" y2="205" class="line"/>
<line x1="690" y1="205" x2="810" y2="205" class="line"/>
<line x1="945" y1="260" x2="945" y2="350" class="line"/>
<line x1="1080" y1="405" x2="1010" y2="405" class="line"/>
<line x1="580" y1="434" x2="580" y2="550" class="line"/>
<line x1="885" y1="434" x2="885" y2="550" class="line"/>
<line x1="1080" y1="460" x2="945" y2="550" class="line"/>
<line x1="470" y1="600" x2="220" y2="205" class="line"/>
</svg>
